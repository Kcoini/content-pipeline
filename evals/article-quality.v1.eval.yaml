# 기사 품질 평가(AI Evals) 기준 정의 - v1 (Phase 1-8 강화)
#
# AI Evals: article.contract.yaml을 통과한 기사 초안에 대해 lib/ai/eval-article.ts가
# 이 기준에 따라 평가를 수행하고, 결과를 eval_runs 테이블에 저장한다.
# 이 평가 결과는 사용자 승인(human_review) 이전에 참고 자료로 제공되며,
# 평가 미통과가 자동으로 기사를 차단하지는 않는다 (최종 판단은 사람이 한다).
#
# Phase 1-8: originality / synthesis / copy-risk / source-integration 기준 추가.
# copy-risk는 가중 평균에 포함하지 않고 독립 gate로 사용한다.
# (copy-risk score 4+ 이거나 synthesis score 1이면 passed=false 강제)

name: article-quality.v1.eval
version: 1
target: article
description: >
  생성된 기사 초안의 품질을 출처 기반성, 독창성, 종합성, 복사 위험도,
  출처 통합도, 구조, 사실/의견 구분, 과장 여부, 가독성 관점에서 평가한다.

model:
  # 평가 모델. 변경 시 이 값과 lib/ai/eval-article.ts를 함께 갱신한다.
  provider: anthropic
  name: claude-sonnet-4-6

criteria:
  # ── 기존 기준 (가중치 조정) ──────────────────────────────────────────────

  - id: factual-grounding
    description: >
      기사의 주요 주장이 인용된 출처 요약으로 뒷받침되는가 (출처 기반성).
      출처에 없는 주장을 사실처럼 서술하면 낮은 점수.
    weight: 0.10
    scale: 1-5
    pass_threshold: 3

  - id: fact-opinion-separation
    description: 사실(fact)과 의견(opinion)이 명확히 구분되어 서술되는가
    weight: 0.05
    scale: 1-5
    pass_threshold: 3

  - id: exaggeration-check
    description: 클릭베이트성 과장 표현이나 근거 없는 단정적 표현이 없는가
    weight: 0.05
    scale: 1-5
    pass_threshold: 3

  - id: unsourced-numbers-check
    description: 출처에 없는 통계, 날짜, 고유명사가 새로 추가되지 않았는가
    weight: 0.10
    scale: 1-5
    pass_threshold: 3

  - id: structure
    description: >
      기사가 리드문→배경→핵심 쟁점→비교/시사점→전망 구조를 갖추고 있는가.
      출처별 요약 나열에 그치면 낮은 점수.
    weight: 0.15
    scale: 1-5
    pass_threshold: 3

  - id: readability
    description: 문장이 명확하고 가독성이 좋은가 (독자 이해도)
    weight: 0.05
    scale: 1-5
    pass_threshold: 3

  # ── Phase 1-8 신규 기준 ──────────────────────────────────────────────────

  - id: originality
    description: >
      기사 문장이 출처 요약과 독립적으로 작성되었는가.
      출처 요약을 거의 그대로 복사했으면 1점, 완전히 재구성했으면 5점.
    weight: 0.20
    scale: 1-5
    pass_threshold: 3

  - id: synthesis
    description: >
      여러 출처의 정보를 통합해 하나의 논지/흐름으로 재구성했는가.
      출처를 각각 나열하는 수준이면 1점, 유기적으로 통합했으면 5점.
    weight: 0.20
    scale: 1-5
    pass_threshold: 2

  - id: source-integration
    description: >
      본문에서 출처를 자연스럽게 언급하거나 인용했는가 (단순 나열 금지).
      출처가 기사 흐름 속에 녹아 있으면 높은 점수.
    weight: 0.10
    scale: 1-5
    pass_threshold: 3

  - id: copy-risk
    description: >
      출처 요약과 15단어 이상 연속으로 동일한 구문이 발견되는가.
      점수가 높을수록 복사 위험이 높다 (1=위험 없음, 5=심각한 복사).
      이 기준은 가중 평균에 포함하지 않으며, 점수 4 이상이면 passed=false 강제.
    weight: 0.00
    scale: 1-5
    pass_threshold: 3

scoring:
  aggregate: weighted_average
  pass_threshold: 3.0
  # copy-risk, synthesis는 별도 gate 조건
  # copy-risk >= 4 → passed=false (가중 평균과 무관)
  # synthesis < 2 → passed=false (가중 평균과 무관)
  copy_risk_fail_threshold: 4
  synthesis_fail_threshold: 2

# lib/ai/eval-article.ts가 반환해야 하는 결과 구조
output:
  format: json
  fields:
    - criteria_scores   # { [criterion_id]: { score, reason } }
    - aggregate_score   # number (copy-risk 제외 가중 평균)
    - passed            # boolean
    - notes             # string (사람이 읽을 요약)
