# 기사 품질 평가(AI Evals) 기준 정의 - v1
#
# AI Evals: article.contract.yaml을 통과한 기사 초안에 대해 lib/ai/eval-article.ts가
# 이 기준에 따라 평가를 수행하고, 결과를 eval_runs 테이블에 저장한다.
# 이 평가 결과는 사용자 승인(human_review) 이전에 참고 자료로 제공되며,
# 평가 미통과가 자동으로 기사를 차단하지는 않는다 (최종 판단은 사람이 한다).
#
# prompts/article-eval.v1.md의 6가지 평가 관점(출처 기반성, 사실/의견 구분,
# 과장 표현 여부, 출처 없는 수치 여부, 기사 구조, 독자 이해도)에 대응한다.

name: article-quality.v1.eval
version: 1
target: article
description: >
  생성된 기사 초안의 품질을 출처 기반성, 사실/의견 구분, 과장 표현 여부,
  출처 없는 수치 여부, 구조, 가독성 관점에서 평가한다.

model:
  # 평가 모델. 변경 시 이 값과 lib/ai/eval-article.ts를 함께 갱신한다.
  provider: anthropic
  name: claude-sonnet-4-6

criteria:
  - id: factual-grounding
    description: 기사의 주요 주장이 인용된 출처 요약으로 뒷받침되는가 (출처 기반성)
    weight: 0.25
    scale: 1-5
    pass_threshold: 3

  - id: fact-opinion-separation
    description: 사실(fact)과 의견(opinion)이 명확히 구분되어 서술되는가
    weight: 0.15
    scale: 1-5
    pass_threshold: 3

  - id: exaggeration-check
    description: 클릭베이트성 과장 표현이나 근거 없는 단정적 표현이 없는가
    weight: 0.15
    scale: 1-5
    pass_threshold: 3

  - id: unsourced-numbers-check
    description: 출처에 없는 통계, 날짜, 고유명사가 새로 추가되지 않았는가
    weight: 0.2
    scale: 1-5
    pass_threshold: 3

  - id: structure
    description: 기사가 도입-본문-결론 구조를 갖추고 있는가
    weight: 0.1
    scale: 1-5
    pass_threshold: 3

  - id: readability
    description: 문장이 명확하고 가독성이 좋은가 (독자 이해도)
    weight: 0.15
    scale: 1-5
    pass_threshold: 3

scoring:
  aggregate: weighted_average
  pass_threshold: 3.0

# lib/ai/eval-article.ts가 반환해야 하는 결과 구조
output:
  format: json
  fields:
    - criteria_scores   # { [criterion_id]: { score, reason } }
    - aggregate_score   # number
    - passed            # boolean
    - notes             # string (사람이 읽을 요약)
