# 기사 품질 평가(AI Evals) 기준 정의
#
# AI Evals: article.contract.yaml을 통과한 기사 초안에 대해 lib/ai/eval-article.ts가
# 이 기준에 따라 LLM 평가를 수행하고, 결과를 eval_runs 테이블에 저장한다.
# 이 평가 결과는 사용자 승인(human_review) 이전에 참고 자료로 제공되며,
# 평가 미통과가 자동으로 기사를 차단하지는 않는다 (최종 판단은 사람이 한다).

name: article-quality.eval
version: 1
target: article
description: >
  생성된 기사 초안의 품질을 사실 기반성, 출처 활용도, 구조, 가독성, 톤앤매너
  관점에서 평가한다.

model:
  # Phase 1에서 사용할 평가 모델. 변경 시 이 값과 lib/ai/eval-article.ts를 함께 갱신한다.
  provider: anthropic
  name: claude-sonnet-4-6

criteria:
  - id: factual-grounding
    description: 기사의 주요 주장이 등록된 출처(sources)로 뒷받침되는가
    weight: 0.35
    scale: 1-5
    pass_threshold: 3

  - id: source-coverage
    description: 등록된 출처가 기사 본문에서 고르게 인용되는가
    weight: 0.15
    scale: 1-5
    pass_threshold: 3

  - id: structure
    description: 기사가 도입-본문-결론 구조를 갖추고 있는가
    weight: 0.15
    scale: 1-5
    pass_threshold: 3

  - id: readability
    description: 문장이 명확하고 가독성이 좋은가
    weight: 0.2
    scale: 1-5
    pass_threshold: 3

  - id: tone-consistency
    description: 블로그/홈페이지 톤앤매너에 적합한가
    weight: 0.15
    scale: 1-5
    pass_threshold: 3

scoring:
  aggregate: weighted_average
  pass_threshold: 3.0

# lib/ai/eval-article.ts가 반환해야 하는 결과 구조
output:
  format: json
  fields:
    - criteria_scores   # { [criterion_id]: { score, reason } }
    - aggregate_score   # number
    - passed            # boolean
    - notes             # string (사람이 읽을 요약)
